<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Перенаправление в INCY</title>
    <style>
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f3f4f6;
            color: #1f2937;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            max-width: 90%;
            width: 400px;
        }
        button {
            background: #0088cc;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 20px;
            cursor: pointer;
            width: 100%;
        }
        pre {
            background: #f3f4f6;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            word-break: break-all;
            white-space: pre-wrap;
            font-size: 12px;
            text-align: left;
        }
        .link-text { margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔄 Перенаправление в INCY</h2>
        <div id="status">⏳ Загрузка...</div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const encodedKey = urlParams.get('key');
        
        if (encodedKey) {
            try {
                const redirectUrl = decodeURIComponent(encodedKey);
                const statusDiv = document.getElementById('status');
                
                // ПРАВИЛЬНАЯ СХЕМА — incy:// (не incv!)
                if (redirectUrl.startsWith('incy://')) {
                    statusDiv.innerHTML = `✅ Перенаправление в <strong>INCY</strong>...`;
                    window.location.href = redirectUrl;
                    
                    setTimeout(() => {
                        statusDiv.innerHTML = `
                            ⚠️ Не удалось открыть INCY автоматически.<br><br>
                            Нажмите кнопку, чтобы скопировать ссылку:
                            <div class="link-text">
                                <pre>${redirectUrl}</pre>
                            </div>
                            <button onclick="copyToClipboard('${redirectUrl.replace(/'/g, "\\'")}')">
                                📋 Скопировать ссылку
                            </button>
                        `;
                    }, 1500);
                } else {
                    statusDiv.innerHTML = `❌ Ошибка: ссылка должна начинаться с <code>incy://</code><br><br>Получено: ${redirectUrl.substring(0, 50)}...`;
                }
            } catch(e) {
                document.getElementById('status').innerHTML = `❌ Ошибка: ${e.message}`;
            }
        } else {
            document.getElementById('status').innerHTML = `❌ Ошибка: ключ не указан.`;
        }
        
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('✅ Ссылка скопирована! Теперь вставьте её в адресную строку браузера.');
            }).catch(() => {
                alert('❌ Не удалось скопировать. Скопируйте вручную.');
            });
        }
    </script>
</body>
</html>
