<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>INCY Redirect</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 2rem; }
        button { background: #0088cc; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; }
        pre { background: #f0f0f0; padding: 10px; border-radius: 6px; overflow-x: auto; }
    </style>
</head>
<body>
    <h2>Перенаправление в INCY</h2>
    <div id="status">Загрузка...</div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const encodedKey = urlParams.get('key');
        const encodedSub = urlParams.get('sub');
        let providerName = urlParams.get('provider_name');
        
        let redirectUrl = null;
        if (encodedKey) {
            redirectUrl = decodeURIComponent(encodedKey);
        } else if (encodedSub) {
            let subUrl = decodeURIComponent(encodedSub);
            let base = `incy://add/${encodeURIComponent(subUrl)}`;
            if (providerName) {
                base += `?provider_name=${encodeURIComponent(providerName)}`;
                base += `#${encodeURIComponent(providerName)}`;
            }
            redirectUrl = base;
        }
        if (redirectUrl) {
            document.getElementById('status').innerHTML = '✅ Перенаправление...';
            window.location.href = redirectUrl;
            setTimeout(() => {
                document.getElementById('status').innerHTML = `
                    ⚠️ Не удалось открыть INCY автоматически.<br>
                    <button onclick="copyToClipboard('${redirectUrl.replace(/'/g, "\\'")}')">Скопировать ссылку</button>
                `;
            }, 1500);
        } else {
            document.getElementById('status').innerHTML = '❌ Ошибка: отсутствуют параметры key или sub.';
        }
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            alert('Ссылка скопирована!');
        }
    </script>
</body>
</html>
